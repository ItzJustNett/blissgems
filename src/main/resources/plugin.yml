name: BlissGems
version: '4.3.0'
main: dev.xoperr.blissgems.BlissGems
api-version: '1.21'
description: Bliss SMP Gem System
author: magicc
website: https://xoperr.dev
softdepend: [WorldGuard, Oraxen]

commands:
  bliss:
    description: Main BlissGems command
    usage: /<command> [subcommand]
    aliases: [gems, bg]
  fixhearts:
    description: Reset a player's max-health to vanilla, removing any stale BlissGems modifiers
    usage: /<command> [player]
    permission: blissgems.fixhearts
  fixedhearts:
    description: Toggle forcing every player to 10 hearts on join
    usage: /<command> everyone <true|false>
    permission: blissgems.fixedhearts
  fixgems:
    description: Replace legacy gem items with their Oraxen-built equivalents
    usage: /<command> [player|all]
    permission: blissgems.fixgems

permissions:
  blissgems.*:
    description: Access to all BlissGems permissions
    default: op
    children:
      blissgems.admin: true
      blissgems.user: true
  blissgems.admin:
    description: Access to admin commands (give, energy, reload, etc.)
    default: op
  blissgems.user:
    description: Access to player commands
    default: true
    children:
      blissgems.use: true
      blissgems.info: true
      blissgems.pockets: true
      blissgems.amplify: true
      blissgems.autosmelt: true
      blissgems.toggle: true
      blissgems.trust: true
      blissgems.ability: true
  blissgems.use:
    description: Allows players to use gem abilities
    default: true
  blissgems.info:
    description: Allows using /bliss info command
    default: true
  blissgems.pockets:
    description: Allows using /bliss pockets command
    default: true
  blissgems.amplify:
    description: Allows using /bliss amplify command
    default: true
  blissgems.toggle:
    description: Allows using /bliss toggle_click command
    default: true
  blissgems.trust:
    description: Allows using /bliss trust commands
    default: true
  blissgems.ability:
    description: Allows using /bliss ability commands
    default: true
  blissgems.autosmelt:
    description: Allows using /bliss autosmelt command (Wealth T2)
    default: true
  blissgems.fixhearts:
    description: Allows using /fixhearts to reset hearts (admins/staff)
    default: op
  blissgems.fixedhearts:
    description: Allows using /fixedhearts to toggle 10-hearts-on-join (admins/staff)
    default: op
  blissgems.fixgems:
    description: Allows using /fixgems to replace legacy gems with Oraxen items
    default: op
